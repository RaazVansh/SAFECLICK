<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFECLICK - AI Phishing Detection</title>
    <link rel="stylesheet" href="styles/popup.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="lib/chart.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <i class="fas fa-shield-alt"></i>
                <h1>SAFECLICK</h1>
            </div>
            <div class="status-indicator" id="statusIndicator">
                <i class="fas fa-check-circle"></i>
                <span>Protected</span>
            </div>
        </div>

        <!-- Current Site Status -->
        <div class="site-status" id="siteStatus">
            <div class="status-card">
                <div class="status-icon" id="statusIcon">
                    <i class="fas fa-shield-check"></i>
                </div>
                <div class="status-info">
                    <h3 id="currentSite">Checking site...</h3>
                    <p id="statusText">Analyzing for threats...</p>
                </div>
            </div>
        </div>

        <!-- Quick Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-eye"></i>
                <div class="stat-info">
                    <h4 id="sitesChecked">0</h4>
                    <p>Sites Checked</p>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-exclamation-triangle"></i>
                <div class="stat-info">
                    <h4 id="threatsBlocked">0</h4>
                    <p>Threats Blocked</p>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-calendar-day"></i>
                <div class="stat-info">
                    <h4 id="todayVisits">0</h4>
                    <p>Today's Visits</p>
                </div>
            </div>
        </div>

        <!-- Threat Chart -->
        <div class="chart-container">
            <h3>Today's Security Overview</h3>
            <canvas id="threatChart" width="300" height="200"></canvas>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="btn btn-primary" id="reportBtn">
                <i class="fas fa-flag"></i>
                Report Site
            </button>
            <button class="btn btn-secondary" id="dashboardBtn">
                <i class="fas fa-chart-line"></i>
                Dashboard
            </button>
        </div>

        <!-- Settings -->
        <div class="settings">
            <button class="btn btn-outline" id="settingsBtn">
                <i class="fas fa-cog"></i>
                Settings
            </button>
        </div>
    </div>

    <script src="scripts/popup.js"></script>
</body>
</html>
